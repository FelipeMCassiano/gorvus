name: Release Binaries

on:
  push:
    tags: 
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Build Linux
      run: |
        cd v2/gorvus
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o ../../gorvus_linux_amd64 ./main.go

    - name: Build Windows
      run: |
        cd v2/gorvus
        CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o ../../gorvus_windows_amd64.exe ./main.go

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}  # v2.5.1 from tag
        name: gorvus ${{ github.ref_name }}
        generate_release_notes: true
        files: |
          gorvus_linux_amd64
          gorvus_windows_amd64.exe
