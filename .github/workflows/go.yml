name: Release Binaries

on:
  push:
    tags: ['v*.*.*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Build Linux
      run: |
        cd v2/gorvus
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X main.Version=${GITHUB_REF_NAME#v}" -o ../../gorvus_linux_amd64 ./main.go

    - name: Build Windows
      run: |
        cd v2/gorvus
        CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -X main.Version=${GITHUB_REF_NAME#v}" -o ../../gorvus_windows_amd64.exe ./main.go

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          gorvus_linux_amd64
          gorvus_windows_amd64.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
